<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner</title>
    <!-- SEO Best Practices applied -->
    <meta name="description"
        content="A minimal, modern study planner to organize your tasks, prioritize subjects, and track your study hours progress.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <h1 class="date-display" id="dateDisplay">Date</h1>
            <p class="motivation-line">"Stay consistent, success will follow"</p>
        </header>

        <main class="main-content">
            <div class="stats-card">
                <div class="stat-item">
                    <span class="stat-label">Total Planned</span>
                    <span class="stat-value" id="totalHours">0h</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Progress</span>
                    <div class="progress-wrapper">
                        <div class="progress-bar" role="progressbar" aria-label="Study progress">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <span class="stat-value progress-text" id="progressText">0%</span>
                    </div>
                </div>
            </div>

            <section class="input-card" aria-label="Add new study task">
                <form id="taskForm" class="task-form">
                    <div class="form-group">
                        <label for="subjectName" class="sr-only">Subject Name</label>
                        <input type="text" id="subjectName" placeholder="Subject name..." required>
                    </div>
                    <div class="form-row">
                        <div class="form-group half">
                            <label for="studyHours" class="sr-only">Study Hours</label>
                            <input type="number" id="studyHours" placeholder="Hours" min="0.1" step="0.1" required>
                        </div>
                        <div class="form-group half">
                            <label for="priority" class="sr-only">Priority</label>
                            <select id="priority" required>
                                <option value="" disabled selected>Priority</option>
                                <option value="High">High</option>
                                <option value="Medium">Medium</option>
                                <option value="Low">Low</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="add-btn" id="addTaskBtn">
                        <i class="fas fa-plus" aria-hidden="true"></i> Add Task
                    </button>
                </form>
            </section>

            <section class="tasks-container" aria-label="Study task list">
                <ul class="task-list" id="taskList">
                    <!-- Tasks will be added here dynamically -->
                </ul>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
